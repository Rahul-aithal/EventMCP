name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Build
        run: |
          mkdir dist
          go build -o dist/eventmcp .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/eventmcp
